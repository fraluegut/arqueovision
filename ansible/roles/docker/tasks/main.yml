---
# ── Install Docker CE + Compose plugin (Ubuntu/Debian) ───────────────────────

- name: Instalar dependencias previas
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - git
      - python3-pip
    state: present
    update_cache: true

- name: Crear directorio para la clave GPG de Docker
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Descargar clave GPG de Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Añadir repositorio oficial de Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64','amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Instalar Docker CE y Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Habilitar y arrancar el servicio Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Añadir {{ deploy_user }} al grupo docker
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
