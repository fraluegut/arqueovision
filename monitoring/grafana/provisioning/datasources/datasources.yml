apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    uid: postgres
    access: proxy
    url: db:5432
    database: arqueovision
    user: arqueovision
    secureJsonData:
      password: arqueovision
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
